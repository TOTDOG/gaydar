name: Sync to HF Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push only model files to Hugging Face Space
        run: |
          cd /tmp
          git clone https://${{ secrets.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_USERNAME }}/${{ secrets.HF_SPACE_NAME }} hf_space
          cd hf_space
          cp $GITHUB_WORKSPACE/encoders.py .
          cp $GITHUB_WORKSPACE/dataset.py .
          cp $GITHUB_WORKSPACE/model.py .
          cp $GITHUB_WORKSPACE/losses.py .
          cp $GITHUB_WORKSPACE/app.py .
          cp $GITHUB_WORKSPACE/Dockerfile .
          cp $GITHUB_WORKSPACE/requirements.txt .
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add .
          git diff --staged --quiet || git commit -m "sync from github"
          git push
